  <text x="43" y="348" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">€120</text>
  <rect x="68" y="336" width="36" height="18" rx="9" fill="#1e1e2e"/>
  <text x="86" y="348" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">⏱ 2h</text>
