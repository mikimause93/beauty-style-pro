  <rect x="0" y="752" width="375" height="60" fill="#0f0f1a" opacity="0.97"/>
  <line x1="0" y1="752" x2="375" y2="752" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <text x="37" y="778" text-anchor="middle" font-size="22" fill="#666">🏠</text>
  <text x="37" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Home</text>
  <text x="112" y="778" text-anchor="middle" font-size="22" fill="#666">🔍</text>
  <text x="112" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Cerca</text>
  <circle cx="187" cy="775" r="20" fill="url(#grad1)"/>
  <text x="187" y="781" text-anchor="middle" font-size="20" fill="white">+</text>
  <text x="262" y="778" text-anchor="middle" font-size="22" fill="#666">💬</text>
  <text x="262" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Chat</text>
  <text x="337" y="778" text-anchor="middle" font-size="22" fill="#666">👤</text>
  <text x="337" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Profilo</text>
</svg>
