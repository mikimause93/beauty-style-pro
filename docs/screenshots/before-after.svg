  <rect x="319" y="72" width="36" height="18" rx="9" fill="rgba(0,0,0,0.5)"/>
  <text x="337" y="84" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="white">Dopo</text>
