  <circle cx="28" cy="26" r="16" fill="#1a1a2e"/>
  <text x="28" y="32" text-anchor="middle" font-size="14" fill="#888">←</text>
  <text x="187" y="34" text-anchor="middle" font-family="Arial Black" font-size="16" font-weight="900" fill="white">Prima &amp; Dopo</text>
  <rect x="290" y="12" width="72" height="28" rx="14" fill="url(#grad1)"/>
  <text x="326" y="30" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="white">✨ Challenge</text>

  <!-- Card 1: Before/After -->
