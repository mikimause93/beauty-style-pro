  <text x="99" y="174" text-anchor="middle" font-size="80">😐</text>
  <!-- After half -->
  <rect x="187" y="64" width="176" height="220" fill="#1a2a40"/>
  <text x="275" y="174" text-anchor="middle" font-size="80">😍</text>
  <!-- Divider line -->
  <line x1="187" y1="64" x2="187" y2="284" stroke="white" stroke-width="2"/>
  <circle cx="187" cy="174" r="16" fill="url(#grad1)" filter="url(#glow)"/>
  <text x="187" y="179" text-anchor="middle" font-family="Arial" font-size="13" fill="white">⟺</text>
  <!-- Labels -->
