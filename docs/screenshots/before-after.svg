  <text x="59" y="378" text-anchor="middle" font-family="Arial" font-size="12" fill="#ec4899">❤️ 234</text>
  <rect x="102" y="360" width="36" height="28" rx="10" fill="#1e1e2e"/>
  <text x="120" y="378" text-anchor="middle" font-size="16" fill="#888">🔖</text>
