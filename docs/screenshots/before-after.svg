  <rect x="12" y="396" width="175" height="200" fill="#402040"/>
  <text x="99" y="496" text-anchor="middle" font-size="80">😶</text>
  <rect x="187" y="396" width="176" height="200" fill="#202a40"/>
  <text x="275" y="496" text-anchor="middle" font-size="80">🤩</text>
  <line x1="187" y1="396" x2="187" y2="596" stroke="white" stroke-width="2"/>
  <circle cx="187" cy="496" r="16" fill="url(#grad1)" filter="url(#glow)"/>
  <text x="187" y="501" text-anchor="middle" font-family="Arial" font-size="13" fill="white">⟺</text>
  <rect x="20" y="404" width="36" height="18" rx="9" fill="rgba(0,0,0,0.5)"/>
  <text x="38" y="416" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="white">Prima</text>
  <rect x="319" y="404" width="36" height="18" rx="9" fill="rgba(0,0,0,0.5)"/>
  <text x="337" y="416" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="white">Dopo</text>
  <text x="24" y="630" font-family="Arial Black" font-size="13" font-weight="900" fill="white">Color Correction</text>
  <text x="24" y="648" font-family="Arial" font-size="11" fill="#888">di Beauty Salon · Platinum Correction</text>
  <rect x="24" y="658" width="36" height="18" rx="9" fill="#1e1e2e"/>
  <text x="42" y="670" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">€95</text>
  <rect x="248" y="658" width="115" height="28" rx="10" fill="url(#grad1)"/>
  <text x="305" y="676" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="white">📍 Prova vicino a te</text>

