  <rect x="12" y="266" width="351" height="160" rx="12" fill="#1a1a2e"/>
  <text x="187" y="292" text-anchor="middle" font-family="Arial Black" font-size="13" font-weight="700" fill="white">Marzo 2026</text>
  <text x="40" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">L</text>
  <text x="93" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">M</text>
  <text x="134" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">M</text>
  <text x="187" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">G</text>
  <text x="228" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">V</text>
  <text x="281" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">S</text>
  <text x="334" y="316" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">D</text>
  <!-- Date row 1 -->
  <text x="228" y="348" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">1</text>
  <text x="281" y="348" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">2</text>
  <text x="334" y="348" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">3</text>
  <!-- Date row 2 -->
  <text x="40" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">4</text>
  <text x="93" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">5</text>
  <text x="134" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">6</text>
  <circle cx="187" cy="372" r="16" fill="url(#grad1)" filter="url(#glow)"/>
  <text x="187" y="378" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="white">7</text>
  <text x="228" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">8</text>
  <text x="281" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">9</text>
  <text x="334" y="380" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">10</text>
  <!-- Date row 3 -->
  <text x="40" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">11</text>
  <text x="93" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">12</text>
  <text x="134" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">13</text>
  <text x="187" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">14</text>
  <text x="228" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">15</text>
  <text x="281" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">16</text>
  <text x="334" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">17</text>

  <!-- Time slots -->
  <text x="20" y="452" font-family="Arial Black" font-size="14" font-weight="700" fill="white">Orario</text>
  <rect x="12" y="460" width="351" height="80" rx="12" fill="#1a1a2e"/>
  <rect x="20" y="470" width="72" height="30" rx="10" fill="url(#grad1)"/>
  <text x="56" y="490" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="white">09:00</text>
  <rect x="100" y="470" width="72" height="30" rx="10" fill="#1e1e2e" stroke="#7c3aed" stroke-opacity="0.3"/>
  <text x="136" y="490" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">10:30</text>
  <rect x="180" y="470" width="72" height="30" rx="10" fill="#1e1e2e" stroke="#7c3aed" stroke-opacity="0.3"/>
  <text x="216" y="490" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">14:00</text>
  <rect x="260" y="470" width="72" height="30" rx="10" fill="#1e1e2e" stroke="#7c3aed" stroke-opacity="0.3"/>
  <text x="296" y="490" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">16:30</text>
  <rect x="20" y="508" width="72" height="30" rx="10" fill="#1e1e2e" stroke="#7c3aed" stroke-opacity="0.3"/>
  <text x="56" y="528" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">18:00</text>

