<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b4e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#0f0f1a" rx="20"/>

  <!-- Header -->
  <rect width="375" height="52" fill="#0f0f1a"/>
  <line x1="0" y1="52" x2="375" y2="52" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <circle cx="28" cy="26" r="16" fill="#1a1a2e"/>
  <text x="28" y="32" text-anchor="middle" font-size="14" fill="#888">←</text>
  <text x="187" y="34" text-anchor="middle" font-family="Arial Black" font-size="16" font-weight="900" fill="white">Nuova Prenotazione</text>

  <!-- Stylist info card -->
  <rect x="12" y="64" width="351" height="80" rx="14" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="56" cy="104" r="24" fill="url(#grad1)"/>
  <text x="56" y="110" text-anchor="middle" font-size="22">👩</text>
  <text x="92" y="96" font-family="Arial Black" font-size="14" font-weight="900" fill="white">Martina Rossi</text>
  <text x="92" y="114" font-family="Arial" font-size="11" fill="#888">Hairstylist · ⭐ 4.9 (127 rec.)</text>
  <text x="340" y="104" text-anchor="middle" font-size="14" fill="#7c3aed">✓</text>

  <!-- Service selection -->
  <text x="20" y="168" font-family="Arial Black" font-size="14" font-weight="700" fill="white">Servizio</text>
  <rect x="12" y="176" width="351" height="56" rx="12" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="24" y="202" font-family="Arial" font-size="13" fill="white">✂️ Taglio + Piega</text>
  <text x="24" y="220" font-family="Arial" font-size="11" fill="#888">60 min · €45</text>
  <text x="340" y="208" text-anchor="middle" font-size="16" fill="#7c3aed">⌄</text>

  <!-- Date picker -->
  <text x="20" y="258" font-family="Arial Black" font-size="14" font-weight="700" fill="white">Data</text>
