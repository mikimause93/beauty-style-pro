  <text x="20" y="564" font-family="Arial Black" font-size="14" font-weight="700" fill="white">Note</text>
  <rect x="12" y="572" width="351" height="60" rx="12" fill="#1a1a2e" stroke="#7c3aed" stroke-opacity="0.3"/>
  <text x="24" y="600" font-family="Arial" font-size="12" fill="#555">Aggiungi una nota per il professionista...</text>

  <!-- Summary -->
  <rect x="12" y="644" width="351" height="68" rx="14" fill="url(#grad2)" stroke="#7c3aed" stroke-opacity="0.3"/>
  <text x="24" y="668" font-family="Arial Black" font-size="13" font-weight="700" fill="white">Riepilogo</text>
  <text x="24" y="688" font-family="Arial" font-size="12" fill="#ccc">✂️ Taglio + Piega · Mar 7 · 09:00</text>
  <text x="316" y="688" text-anchor="end" font-family="Arial Black" font-size="15" font-weight="900" fill="url(#grad1)">€45</text>

  <!-- CTA Button -->
  <rect x="12" y="724" width="351" height="44" rx="14" fill="url(#grad1)"/>
  <text x="187" y="751" text-anchor="middle" font-family="Arial Black" font-size="15" font-weight="900" fill="white">✓ Conferma Prenotazione</text>

  <!-- Bottom Nav -->
  <rect x="0" y="772" width="375" height="40" fill="#0f0f1a" opacity="0.97"/>
  <line x1="0" y1="772" x2="375" y2="772" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
</svg>
