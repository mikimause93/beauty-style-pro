<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="postGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b4e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#0f0f1a" rx="20"/>

  <!-- Header -->
  <rect width="375" height="52" fill="#0f0f1a" opacity="0.95"/>
  <line x1="0" y1="52" x2="375" y2="52" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <!-- Logo -->
  <text x="16" y="34" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#grad1)">✦ STYLE</text>
  <!-- Header icons -->
  <text x="316" y="34" font-size="20" fill="#888">🔔</text>
  <text x="344" y="34" font-size="20" fill="#888">🌙</text>

  <!-- Stories Bar -->
  <rect x="0" y="52" width="375" height="88" fill="#0f0f1a"/>
  <!-- Story 1 - active/gradient ring -->
  <circle cx="44" cy="96" r="28" fill="url(#grad1)" />
  <circle cx="44" cy="96" r="24" fill="#1a1a2e" />
  <text x="44" y="101" text-anchor="middle" font-size="20">👤</text>
  <text x="44" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Tu</text>
  <!-- Story 2 -->
  <circle cx="108" cy="96" r="28" fill="url(#grad2)" />
  <circle cx="108" cy="96" r="24" fill="#1a1a2e" />
  <text x="108" y="101" text-anchor="middle" font-size="20">💇‍♀️</text>
  <text x="108" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Martina</text>
  <!-- Story 3 -->
  <circle cx="172" cy="96" r="28" fill="url(#grad3)" />
  <circle cx="172" cy="96" r="24" fill="#1a1a2e" />
  <text x="172" y="101" text-anchor="middle" font-size="20">✂️</text>
  <text x="172" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Luigi</text>
  <!-- Story 4 -->
  <circle cx="236" cy="96" r="28" fill="url(#grad1)" />
  <circle cx="236" cy="96" r="24" fill="#1a1a2e" />
  <text x="236" y="101" text-anchor="middle" font-size="20">💅</text>
  <text x="236" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Elena</text>
  <!-- Story 5 -->
  <circle cx="300" cy="96" r="28" fill="url(#grad2)" />
  <circle cx="300" cy="96" r="24" fill="#1a1a2e" />
  <text x="300" y="101" text-anchor="middle" font-size="20">🎨</text>
  <text x="300" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Sofia</text>

  <!-- Tabs -->
  <rect x="0" y="140" width="375" height="36" fill="#0f0f1a"/>
  <rect x="12" y="146" width="52" height="24" rx="12" fill="#7c3aed"/>
  <text x="38" y="162" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="white">Nuovi</text>
  <rect x="72" y="146" width="54" height="24" rx="12" fill="#1a1a2e"/>
  <text x="99" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Stilisti</text>
  <rect x="134" y="146" width="60" height="24" rx="12" fill="#1a1a2e"/>
  <text x="164" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Popolari</text>
  <rect x="202" y="146" width="56" height="24" rx="12" fill="#1a1a2e"/>
  <text x="230" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Stream</text>

  <!-- Post Card 1 -->
  <rect x="12" y="184" width="351" height="280" rx="16" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Post header -->
  <circle cx="44" cy="210" r="16" fill="url(#grad1)"/>
  <text x="44" y="215" text-anchor="middle" font-size="14">👩</text>
  <text x="68" y="205" font-family="Arial" font-size="13" font-weight="700" fill="white">Martina Rossi</text>
  <text x="68" y="220" font-family="Arial" font-size="11" fill="#888">2 ore fa · Stilista ✓</text>
  <text x="340" y="210" text-anchor="middle" font-size="18" fill="#888">⋯</text>
  <!-- Post image area -->
  <rect x="12" y="230" width="351" height="185" fill="url(#postGrad)"/>
  <text x="187" y="320" text-anchor="middle" font-size="60">💇‍♀️</text>
  <text x="187" y="370" text-anchor="middle" font-family="Arial" font-size="13" fill="#ccc">Balayage Caramel Transformation ✨</text>
  <!-- Post caption -->
  <text x="24" y="430" font-family="Arial" font-size="12" fill="#ccc">Nuova trasformazione balayage! Prenota ora 🔥</text>
  <!-- Post actions -->
  <text x="24" y="454" font-size="16" fill="#ec4899">❤️</text>
  <text x="44" y="454" font-family="Arial" font-size="12" fill="#ec4899">234</text>
  <text x="90" y="454" font-size="16" fill="#888">💬</text>
  <text x="110" y="454" font-family="Arial" font-size="12" fill="#888">18</text>
  <text x="156" y="454" font-size="16" fill="#888">↗️</text>
  <text x="176" y="454" font-family="Arial" font-size="12" fill="#888">Share</text>
  <text x="336" y="454" font-size="16" fill="#888">🔖</text>

  <!-- Post Card 2 (partial) -->
  <rect x="12" y="476" width="351" height="120" rx="16" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="44" cy="502" r="16" fill="url(#grad2)"/>
  <text x="44" y="507" text-anchor="middle" font-size="14">👨</text>
  <text x="68" y="497" font-family="Arial" font-size="13" font-weight="700" fill="white">Marco Barbieri</text>
  <text x="68" y="512" font-family="Arial" font-size="11" fill="#888">5 ore fa · Barbiere ✓</text>
  <text x="24" y="540" font-family="Arial" font-size="12" fill="#ccc">Taglio fade moderno 🪒 DM per prenotare!</text>
  <text x="24" y="568" font-size="16" fill="#888">❤️</text>
  <text x="44" y="568" font-family="Arial" font-size="12" fill="#888">156</text>
  <text x="90" y="568" font-size="16" fill="#888">💬</text>
  <text x="110" y="568" font-family="Arial" font-size="12" fill="#888">9</text>

  <!-- Chatbot FAB -->
  <circle cx="330" cy="716" r="24" fill="url(#grad1)" filter="url(#glow)"/>
  <text x="330" y="724" text-anchor="middle" font-size="20">🤖</text>

  <!-- Bottom Nav -->
  <rect x="0" y="752" width="375" height="60" fill="#0f0f1a" opacity="0.97"/>
  <line x1="0" y1="752" x2="375" y2="752" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <!-- Home -->
  <text x="37" y="778" text-anchor="middle" font-size="22" fill="#7c3aed">🏠</text>
  <text x="37" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#7c3aed">Home</text>
  <!-- Search -->
  <text x="112" y="778" text-anchor="middle" font-size="22" fill="#666">🔍</text>
  <text x="112" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Cerca</text>
  <!-- Create -->
  <circle cx="187" cy="775" r="20" fill="url(#grad1)"/>
  <text x="187" y="781" text-anchor="middle" font-size="20" fill="white">+</text>
  <!-- Chat -->
  <text x="262" y="778" text-anchor="middle" font-size="22" fill="#666">💬</text>
  <text x="262" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Chat</text>
  <!-- Profile -->
  <text x="337" y="778" text-anchor="middle" font-size="22" fill="#666">👤</text>
  <text x="337" y="796" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Profilo</text>
</svg>
