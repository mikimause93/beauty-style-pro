    <div id="root"></div>
    <!-- SPA redirect handler for GitHub Pages 404 redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem("spa-redirect");
        if (redirect) {
          sessionStorage.removeItem("spa-redirect");
          try {
            var data = JSON.parse(redirect);
            var url = data.path + (data.search || "") + (data.hash || "");
            window.history.replaceState(null, "", url);
          } catch (e) {
            console.error("Failed to parse spa-redirect:", e);
          }        }
      })();
    </script>
