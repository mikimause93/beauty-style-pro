<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Beauty Style Pro</title>
  <script>
    var l = window.location;
    var base = '/beauty-style-pro';
    var p = l.pathname.replace(base, '') || '/';
    var q = l.search.slice(1);
    var h = l.hash;
    var url = base + '/?p=' + encodeURIComponent(p) + (q ? '&q=' + encodeURIComponent(q) : '') + h;
    l.replace(url);
  </script>
</head>
</html>
