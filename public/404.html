<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>STYLE - La Piattaforma Beauty</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the full URL into a query parameter so the main index.html
      // can restore the original path via the History API.
      var segmentCount = 1; // number of path segments in the repo name (beauty-style-pro)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
