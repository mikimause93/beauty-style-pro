<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>STYLE Beauty</title>
    <script>
      // Single Page Apps for GitHub Pages
      // This script takes the current URL and converts the path and query
      // string into just a query string, and then redirects the browser to
      // the new URL with only a query string and hash fragment.
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
