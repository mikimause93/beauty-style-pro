name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit (high severity)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        # Fails the job if any high or critical vulnerabilities are found.
        # To review advisories: npm audit --json | npx npm-audit-report

      - name: Check for known vulnerabilities (audit output)
        if: failure()
        run: npm audit --json || true
